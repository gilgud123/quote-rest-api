# Development Profile Configuration

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quotedb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/quote}

# Logging - more verbose for development
logging:
  level:
    com.katya.quoterestapi: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG

app:
  security:
    keycloak:
      client-id: ${KEYCLOAK_CLIENT_ID:quote-api}
