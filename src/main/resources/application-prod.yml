# Production Profile Configuration

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/quotedb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: never # Don't run schema/data scripts in production

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

app:
  security:
    keycloak:
      client-id: ${KEYCLOAK_CLIENT_ID:quote-api}

# Logging - less verbose for production
logging:
  level:
    com.katya.quoterestapi: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
  file:
    name: logs/quote-rest-api.log
    max-size: 10MB
    max-history: 30
