# Docker Compose configuration for Quote REST API
# Runs PostgreSQL and Spring Boot application together

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quote-postgres
    environment:
      POSTGRES_DB: quotedb
      POSTGRES_USER: quoteuser
      POSTGRES_PASSWORD: quotepass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quote-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quoteuser -d quotedb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quote-rest-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quotedb
      SPRING_DATASOURCE_USERNAME: quoteuser
      SPRING_DATASOURCE_PASSWORD: quotepass
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/quote
      KEYCLOAK_CLIENT_ID: quote-api
      KEYCLOAK_ACCEPTED_ISSUERS: "http://keycloak:8080/realms/quote,http://localhost:8081/realms/quote"
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8787"
    ports:
      - "8080:8080"
      - "8787:8787" # Debug port
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quote-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Keycloak Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: quote-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-quote.json:/opt/keycloak/data/import/realm-quote.json:ro
    networks:
      - quote-network
    restart: unless-stopped

  # Jenkins CI/CD Server
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: quote-jenkins:latest
    container_name: quote-jenkins
    privileged: true
    user: root
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "8090:8080" # Jenkins web UI
      - "50000:50000" # Jenkins agent port
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Docker-in-Docker
      - ./:/workspace # Mount project directory
    networks:
      - quote-network
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  postgres-data:
    driver: local
    name: quote-postgres-data
  jenkins-data:
    driver: local
    name: quote-jenkins-data

# Custom network for service communication
networks:
  quote-network:
    driver: bridge
    name: quote-network
