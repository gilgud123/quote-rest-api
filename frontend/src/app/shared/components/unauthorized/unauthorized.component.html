<div class="unauthorized-container">
  <div class="unauthorized-content">
    <div class="icon">🔒</div>
    <h1>Access Denied</h1>
    <p>You don't have permission to access this page.</p>
    <p class="description">
      This page requires authentication or specific roles that you don't currently have.
    </p>
    <div class="actions">
      <button class="btn-primary" (click)="login()">Login</button>
      <button class="btn-secondary" (click)="goBack()">Go Back</button>
    </div>
  </div>
</div>
