name: API Contract Tests (Newman)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  newman:
    name: Run Postman Collection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17 for Docker build
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Set up Node.js (for Newman)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Newman and JUnit reporter
        run: npm install -g newman newman-reporter-junitfull

      - name: Build application JAR (skip tests and Spotless)
        run: |
          mvn --batch-mode package \
            -DskipTests \
            -Dspotless.check.skip=true \
            -pl backend -am

      - name: Start full stack (PostgreSQL + Keycloak + App)
        run: docker compose up -d --build
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Wait for application to be healthy
        run: |
          echo "Waiting for application health check..."
          timeout 120 bash -c '
            until curl -sf http://localhost:8080/actuator/health | grep -q "\"status\":\"UP\""; do
              echo "  App not ready yet, retrying in 5s..."
              sleep 5
            done
          '
          echo "Application is healthy."

      - name: Get Keycloak access token and inject into environment
        id: token
        run: |
          TOKEN=$(curl -sf \
            -d "client_id=quote-api" \
            -d "username=frontend-admin" \
            -d "password=password" \
            -d "grant_type=password" \
            http://localhost:8081/realms/quote/protocol/openid-connect/token \
            | jq -r '.access_token')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create Newman environment file
        run: |
          cat > newman-env.json <<EOF
          {
            "id": "ci-environment",
            "name": "CI",
            "values": [
              { "key": "token",    "value": "${{ steps.token.outputs.token }}", "enabled": true },
              { "key": "baseUrl",  "value": "http://localhost:8080",            "enabled": true }
            ]
          }
          EOF

      - name: Run Newman collection
        run: |
          newman run "postman/Quote REST API.postman_collection.json" \
            --environment newman-env.json \
            --reporters cli,junitfull \
            --reporter-junitfull-export newman-results.xml \
            --bail

      - name: Publish Newman test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: API Contract Test Results
          path: newman-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Stop full stack
        if: always()
        run: docker compose down -v
