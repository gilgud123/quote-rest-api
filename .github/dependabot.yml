version: 2

updates:
  # ──────────────────────────────────────────────
  # Maven — backend Java dependencies
  # ──────────────────────────────────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
    open-pull-requests-limit: 10
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework.security:*"
          - "org.springframework:*"
      testcontainers:
        patterns:
          - "org.testcontainers:*"
      mapstruct:
        patterns:
          - "org.mapstruct:*"
      spotless:
        patterns:
          - "com.diffplug.spotless:*"
          - "com.google.googlejavaformat:*"
      springdoc:
        patterns:
          - "org.springdoc:*"

  # ──────────────────────────────────────────────
  # GitHub Actions — workflow action versions
  # ──────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "actions/*"
          - "github/*"
          - "dorny/*"
          - "aquasecurity/*"

  # ──────────────────────────────────────────────
  # Docker — base images in Dockerfiles
  # ──────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - docker
